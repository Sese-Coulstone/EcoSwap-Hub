spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/user_db}
    username: ${DATABASE_USERNAME:ecoswap_user}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ecoswap}

# Keycloak Configuration
keycloak:
  realm: ${KEYCLOAK_REALM:ecoswap}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:ecoswap-admin}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:afbSklXDhAVd2BiRbOt9HtjRxDFANNzi}
  resource-client-id: ${KEYCLOAK_RESOURCE_CLIENT_ID:ecoswap-client}
  resource-client-secret: ${KEYCLOAK_RESOURCE_CLIENT_SECRET:I1b53Q3p04XDU4rIHiddGQVT9paYVE0l}
  token-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token

# Application Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  activation-token-expiry: ${ACTIVATION_TOKEN_EXPIRY:86400000} # 24 hours in milliseconds

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api/users

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:DEBUG}