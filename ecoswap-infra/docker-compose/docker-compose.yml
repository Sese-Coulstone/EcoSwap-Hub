services:
  # ==================== DATABASES ====================
  # NOTE: PostgreSQL 17+ requires mounting to /var/lib/postgresql (not /data subdirectory)
  # This allows pg_upgrade compatibility. See: https://github.com/docker-library/postgres/pull/1259

  postgres-user:
    image: postgres:17
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER:-ecoswap_user}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-password}
      POSTGRES_DB: ${USER_DB_NAME:-user_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-ecoswap_user} -d ${USER_DB_NAME:-user_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-item:
    image: postgres:17
    container_name: postgres-item
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ITEM_DB_USER:-ecoswap_item}
      POSTGRES_PASSWORD: ${ITEM_DB_PASSWORD:-password}
      POSTGRES_DB: ${ITEM_DB_NAME:-item_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres-item-data:/var/lib/postgresql
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ITEM_DB_USER:-ecoswap_item} -d ${ITEM_DB_NAME:-item_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-exchange:
    image: postgres:17
    container_name: postgres-exchange
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EXCHANGE_DB_USER:-ecoswap_exchange}
      POSTGRES_PASSWORD: ${EXCHANGE_DB_PASSWORD:-password}
      POSTGRES_DB: ${EXCHANGE_DB_NAME:-exchange_db}
    ports:
      - "5435:5432"
    volumes:
      - postgres-exchange-data:/var/lib/postgresql
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EXCHANGE_DB_USER:-ecoswap_exchange} -d ${EXCHANGE_DB_NAME:-exchange_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== KEYCLOAK ====================
  postgres-keycloak:
    image: postgres:17
    container_name: postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-password}
      POSTGRES_DB: keycloak
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - ecoswap-network

  # ==================== PLATFORM SERVICES ====================
  config-server:
    image: ecoswap/config-server:latest
    build:
      context: ../../
      dockerfile: ecoswap-platform/config-server/Dockerfile
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  service-discovery:
    image: ecoswap/service-discovery:latest
    build:
      context: ../../
      dockerfile: ecoswap-platform/service-discovery/Dockerfile
    container_name: service-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_HOSTNAME: service-discovery
      EUREKA_PREFER_IP: "true"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    image: ecoswap/api-gateway:latest
    build:
      context: ../../
      dockerfile: ecoswap-platform/api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://service-discovery:8761/eureka/
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/ecoswap/protocol/openid-connect/certs
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ecoswap
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      service-discovery:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - ecoswap-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


volumes:
  postgres-user-data:
  postgres-item-data:
  postgres-exchange-data:
  postgres-keycloak-data:

networks:
  ecoswap-network:
    driver: bridge